[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Route API calls through the serverless proxy (keeps the token server-side).
# Must come before the SPA fallback below.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/proxy/:splat"
  status = 200

# SPA fallback: serve index.html for any non-file route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
